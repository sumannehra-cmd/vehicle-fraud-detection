name: Vehicle Fraud Detection CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Code lao
      - name: Code checkout karo
        uses: actions/checkout@v3

      # Step 2 - Node.js setup karo
      - name: Node.js setup
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3 - Backend packages install karo
      - name: Backend packages install
        run: |
          cd backend
          npm install

      # Step 4 - Frontend packages install karo
      - name: Frontend packages install
        run: |
          cd frontend
          npm install

      # Step 5 - Frontend build karo
      - name: Frontend build
        run: |
          cd frontend
          npm run build

      # Step 6 - Success message
      - name: Done!
        run: echo "Build successful! Sab theek hai!"